<section id="settingsSection" class="panel page-panel hidden">
  <div class="panel-header page-header">
    <div>
      <div class="eyebrow">Owner</div>
      <h2 id="settingsTitleText">Settings</h2>
      <p id="settingsSubtitleText">Owner/Admin controls</p>
    </div>
  </div>

  <div class="settings-accordion">
    <details class="settings-popout" open>
      <summary>
        <span>Portal Settings</span>
      </summary>
      <div class="settings-popout-body">
        <div class="form-grid">
          <div class="field">
            <label for="settingsPortalName">Portal Name</label>
            <input id="settingsPortalName" type="text" />
          </div>
          <div class="field">
            <label for="settingsPortalSubtitle">Portal Subtitle</label>
            <input id="settingsPortalSubtitle" type="text" />
          </div>
          <div class="field">
            <label for="settingsAnnouncement">Announcement</label>
            <input id="settingsAnnouncement" type="text" />
          </div>
          <div class="field">
            <label for="settingsBankId">Bank ID</label>
            <input id="settingsBankId" type="text" />
          </div>
        </div>

        <div class="button-row">
          <button id="saveSettingsBtn" class="btn btn-primary" type="button">Save Portal Settings</button>
        </div>
        <div id="settingsMsg" class="message"></div>
      </div>
    </details>

    <details class="settings-popout">
      <summary>
        <span>Theme</span>
      </summary>
      <div class="settings-popout-body">
        <div class="form-grid">
          <div class="field"><label for="themePrimary">Primary</label><input id="themePrimary" type="color" /></div>
          <div class="field"><label for="themePrimaryDark">Primary Dark</label><input id="themePrimaryDark" type="color" /></div>
          <div class="field"><label for="themeSecondary">Secondary</label><input id="themeSecondary" type="color" /></div>
          <div class="field"><label for="themeBg">Background</label><input id="themeBg" type="color" /></div>
          <div class="field"><label for="themeCard">Card</label><input id="themeCard" type="color" /></div>
          <div class="field"><label for="themeText">Text</label><input id="themeText" type="color" /></div>
          <div class="field"><label for="themeMuted">Muted</label><input id="themeMuted" type="color" /></div>
          <div class="field"><label for="themeBorder">Border</label><input id="themeBorder" type="color" /></div>
        </div>

        <div class="button-row">
          <button id="saveThemeBtn" class="btn btn-primary" type="button">Save Theme</button>
        </div>
        <div id="themeMsg" class="message"></div>
      </div>
    </details>

    <details class="settings-popout">
      <summary>
        <span>UI Text</span>
      </summary>
      <div class="settings-popout-body">
        <div class="form-grid">
          <div class="field"><label for="uiLogoEmoji">Logo Emoji</label><input id="uiLogoEmoji" type="text" /></div>
          <div class="field"><label for="uiLoginTitle">Login Title</label><input id="uiLoginTitle" type="text" /></div>
          <div class="field"><label for="uiLoginSubtitle">Login Subtitle</label><input id="uiLoginSubtitle" type="text" /></div>
          <div class="field"><label for="uiDashboardTitle">Dashboard Title</label><input id="uiDashboardTitle" type="text" /></div>
          <div class="field"><label for="uiDashboardSubtitle">Dashboard Subtitle</label><input id="uiDashboardSubtitle" type="text" /></div>
          <div class="field"><label for="uiPOSTitle">POS Title</label><input id="uiPOSTitle" type="text" /></div>
          <div class="field"><label for="uiPOSSubtitle">POS Subtitle</label><input id="uiPOSSubtitle" type="text" /></div>
          <div class="field"><label for="uiOrdersTitle">Orders Title</label><input id="uiOrdersTitle" type="text" /></div>
          <div class="field"><label for="uiOrdersSubtitle">Orders Subtitle</label><input id="uiOrdersSubtitle" type="text" /></div>
          <div class="field"><label for="uiRewardsTitle">Rewards Title</label><input id="uiRewardsTitle" type="text" /></div>
          <div class="field"><label for="uiRewardsSubtitle">Rewards Subtitle</label><input id="uiRewardsSubtitle" type="text" /></div>
          <div class="field"><label for="uiRaffleTitle">Raffle Title</label><input id="uiRaffleTitle" type="text" /></div>
          <div class="field"><label for="uiRaffleSubtitle">Raffle Subtitle</label><input id="uiRaffleSubtitle" type="text" /></div>
          <div class="field"><label for="uiPayrollTitle">Payroll Title</label><input id="uiPayrollTitle" type="text" /></div>
          <div class="field"><label for="uiPayrollSubtitle">Payroll Subtitle</label><input id="uiPayrollSubtitle" type="text" /></div>
          <div class="field"><label for="uiSettingsTitle">Settings Title</label><input id="uiSettingsTitle" type="text" /></div>
          <div class="field"><label for="uiSettingsSubtitle">Settings Subtitle</label><input id="uiSettingsSubtitle" type="text" /></div>
        </div>

        <div class="button-row">
          <button id="saveUITextBtn" class="btn btn-primary" type="button">Save UI Text</button>
        </div>
        <div id="uiTextMsg" class="message"></div>
      </div>
    </details>

    <details class="settings-popout">
      <summary>
        <span>Products</span>
      </summary>
      <div class="settings-popout-body">
        <div id="productsAdminList" class="admin-list"></div>
        <div class="button-row">
          <button id="addProductRowBtn" class="btn btn-secondary" type="button">Add Product</button>
          <button id="saveProductsBtn" class="btn btn-primary" type="button">Save Products</button>
        </div>
        <div id="productsMsg" class="message"></div>
      </div>
    </details>

    <details class="settings-popout">
      <summary>
        <span>Employees</span>
      </summary>
      <div class="settings-popout-body">
        <div id="employeesAdminList" class="admin-list"></div>
        <div class="button-row">
          <button id="addEmployeeRowBtn" class="btn btn-secondary" type="button">Add Employee</button>
          <button id="saveEmployeesBtn" class="btn btn-primary" type="button">Save Employees</button>
        </div>
        <div id="employeesMsg" class="message"></div>
      </div>
    </details>

    <details class="settings-popout">
      <summary>
        <span>Payment Methods</span>
      </summary>
      <div class="settings-popout-body">
        <div id="paymentMethodsAdminList" class="admin-list"></div>
        <div class="button-row">
          <button id="addPaymentMethodRowBtn" class="btn btn-secondary" type="button">Add Method</button>
          <button id="savePaymentMethodsBtn" class="btn btn-primary" type="button">Save Methods</button>
        </div>
        <div id="paymentMethodsMsg" class="message"></div>
      </div>
    </details>
  </div>
</section>
