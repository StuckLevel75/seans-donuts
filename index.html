<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sean's Donuts Portal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- LOADING -->
<div id="loadingOverlay" class="loading-overlay hidden">
  <div class="loading-card">
    <div class="loading-spinner"></div>
    <div id="loadingTitle">LOADING</div>
    <div id="loadingText">Please wait...</div>
  </div>
</div>

<!-- LOGIN -->
<section id="loginView" class="login-page">
  <div class="login-card-v1">
    <div id="loginLogo">🍩</div>
    <h1>Sean's Donuts Portal</h1>

    <input id="loginValue" placeholder="Username or Email"/>
    <input id="loginPin" type="password" placeholder="PIN"/>

    <button id="loginBtn">Login</button>
  </div>
</section>

<!-- PORTAL -->
<section id="portalView" class="hidden">

<header class="topbar">
  <h1 id="portalName">Sean's Donuts</h1>

  <div>
    <span id="userBadge">👋 Hello</span>
    <span id="sessionRole"></span>
    <span id="bankIdText"></span>

    <button id="portalRefreshBtn">Refresh</button>
    <button id="logoutBtn">Logout</button>
  </div>
</header>

<!-- NAV -->
<div id="navTabs"></div>

<!-- SETTINGS -->
<section id="settingsSection">

<h2>Settings</h2>

<!-- PRODUCTS -->
<h3>Products</h3>
<div id="productsAdminList"></div>
<button id="addProductRowBtn">Add Product</button>
<button id="saveProductsBtn">Save Products</button>

<!-- EMPLOYEES -->
<h3>Employees</h3>
<div id="employeesAdminList"></div>
<button id="addEmployeeRowBtn">Add Employee</button>
<button id="saveEmployeesBtn">Save Employees</button>

<!-- PAYMENT METHODS (NEW STYLE) -->
<h3>Payment Methods</h3>
<div id="paymentMethodsAdminList"></div>
<button id="addPaymentMethodRowBtn">Add Method</button>
<button id="savePaymentMethodsBtn">Save Methods</button>

</section>

</section>

<!-- ========================= -->
<!-- PRODUCT MODAL -->
<!-- ========================= -->
<div id="productModalBackdrop" class="modal-backdrop hidden"></div>
<div id="productModal" class="settings-modal hidden">
  <div class="settings-modal-card">
    <h2 id="productModalTitle">PRODUCT</h2>

    <input id="productModalIndex" type="hidden">

    <input id="productModalName" placeholder="Name">
    <input id="productModalPrice" type="number" placeholder="Price">

    <select id="productModalActive">
      <option>Yes</option>
      <option>No</option>
    </select>

    <button id="productModalSave">Save</button>
    <button id="productModalDelete">Delete</button>
    <button id="productModalCancel">Cancel</button>
  </div>
</div>

<!-- ========================= -->
<!-- EMPLOYEE MODAL -->
<!-- ========================= -->
<div id="employeeModalBackdrop" class="modal-backdrop hidden"></div>
<div id="employeeModal" class="settings-modal hidden">
  <div class="settings-modal-card">

    <input id="employeeModalIndex" type="hidden">

    <input id="employeeModalName" placeholder="Name">
    <input id="employeeModalEmail" placeholder="Email">
    <input id="employeeModalUsername" placeholder="Username">
    <input id="employeeModalPin" placeholder="PIN">
    <input id="employeeModalRole" placeholder="Role">

    <select id="employeeModalActive">
      <option>Yes</option>
      <option>No</option>
    </select>

    <button id="employeeModalSave">Save</button>
    <button id="employeeModalDelete">Delete</button>
    <button id="employeeModalCancel">Cancel</button>
  </div>
</div>

<!-- ========================= -->
<!-- PAYMENT METHOD MODAL (NEW) -->
<!-- ========================= -->
<div id="paymentModalBackdrop" class="modal-backdrop hidden"></div>
<div id="paymentModal" class="settings-modal hidden">
  <div class="settings-modal-card">

    <input id="paymentModalIndex" type="hidden">

    <input id="paymentModalName" placeholder="Method Name">

    <select id="paymentModalActive">
      <option>Yes</option>
      <option>No</option>
    </select>

    <button id="paymentModalSave">Save</button>
    <button id="paymentModalDelete">Delete</button>
    <button id="paymentModalCancel">Cancel</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
