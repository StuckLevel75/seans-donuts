<!DOCTYPE html>
<html>
<head>
  <title>Sean's Donuts Portal</title>
</head>
<body>

<div id="loginView">
  <h2>Login</h2>
  <input id="loginValue" placeholder="Username/Email">
  <input id="loginPin" placeholder="PIN">
  <button id="loginBtn">Login</button>
</div>

<div id="portalView" class="hidden">

  <h2>Ads Manager</h2>

  <input id="adTitle" placeholder="Title">
  <input id="adPlatform" placeholder="Platform">
  <input id="adImage" placeholder="Image URL">
  <input id="adLink" placeholder="Link">

  <select id="adStatus">
    <option>Active</option>
    <option>Draft</option>
  </select>

  <textarea id="adText" placeholder="Ad text"></textarea>

  <button onclick="saveAd()">Save Ad</button>

  <hr>

  <div id="adsList"></div>

</div>

<script src="app.js"></script>

</body>
</html>
