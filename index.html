<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sean's Donuts Portal</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginView" class="login-page">
  <div class="login-card">
    <div class="logo">🍩</div>
    <h1>Sean's Donuts</h1>
    <p>Employee Portal</p>

    <input id="loginValue" placeholder="Email or Username">
    <input id="loginPin" type="password" placeholder="PIN">

    <button id="loginBtn">Login</button>
  </div>
</div>

<!-- APP -->
<div id="portalView" class="hidden">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="logo">🍩</div>
      <div>
        <h2 id="portalName">Sean's Donuts</h2>
        <p id="portalSubtitle">Portal</p>
      </div>
    </div>

    <div class="header-right">
      <span id="userBadge"></span>
      <button id="portalRefreshBtn">Refresh</button>
      <button id="logoutBtn">Logout</button>
    </div>
  </div>

  <!-- NAV -->
  <div class="nav" id="navTabs"></div>

  <!-- CONTENT -->
  <div class="content">

    <!-- DASHBOARD -->
    <div id="dashboardSection" class="page">
      <div class="card">
        <h2>Dashboard</h2>
        <p id="welcomeTitle"></p>
      </div>

      <div class="grid">
        <div class="card"><h3>Orders</h3><span id="statOrders"></span></div>
        <div class="card"><h3>Sales</h3><span id="statSales"></span></div>
        <div class="card"><h3>Employees</h3><span id="statEmployees"></span></div>
        <div class="card"><h3>Raffle</h3><span id="statRaffle"></span></div>
      </div>
    </div>

    <!-- POS -->
    <div id="posSection" class="page hidden">
      <div class="grid-2">

        <div class="card">
          <h3>Products</h3>
          <div id="productGrid"></div>
        </div>

        <div class="card">
          <h3>Cart</h3>
          <div id="cartList"></div>

          <div class="totals">
            <div>Subtotal: <span id="subtotalText"></span></div>
            <div>Total: <span id="totalText"></span></div>
          </div>

          <input id="customerName" placeholder="Customer Name">
          <input id="customerDiscord" placeholder="Discord">
          <input id="phoneNumber" placeholder="Phone">

          <button id="submitOrderBtn">Submit Order</button>
        </div>

      </div>
    </div>

    <!-- SETTINGS -->
    <div id="settingsSection" class="page hidden">
      <div class="card">
        <h2>Settings</h2>

        <h3>Products</h3>
        <div id="productsAdminList"></div>
        <button id="addProductRowBtn">Add Product</button>
        <button id="saveProductsBtn">Save</button>

        <h3>Payment Methods</h3>
        <div id="paymentMethodsAdminList"></div>
        <button id="addPaymentMethodRowBtn">Add Method</button>
        <button id="savePaymentMethodsBtn">Save</button>

      </div>
    </div>

  </div>
</div>

<script src="app.js"></script>

</body>
</html>
