<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sean's Donuts Portal</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginView" class="login-page">
  <div class="login-card-v1">
    <div id="loginLogo" class="login-logo-v1">🍩</div>
    <h1 id="loginTitle">Sean's Donuts</h1>
    <p id="loginSubtitle">Employee Portal</p>

    <div class="login-fields">
      <input id="loginValue" placeholder="Email or Username">
      <input id="loginPin" type="password" placeholder="PIN">
    </div>

    <button id="loginBtn" class="login-btn-v1">Login</button>
  </div>
</div>

<!-- PORTAL -->
<div id="portalView" class="app-shell hidden">

  <!-- HEADER -->
  <div class="topbar">
    <div class="topbar-main">

      <div class="brand-wrap">
        <div id="brandLogo" class="brand-mark">🍩</div>
        <div>
          <h1 id="portalName">Sean's Donuts</h1>
          <p id="portalSubtitle">Portal</p>
        </div>
      </div>

      <div class="topbar-right-header">
        <div class="header-meta-bar">
          <div class="header-meta-item">
            <span class="header-meta-label">User</span>
            <span id="userBadge" class="header-meta-value"></span>
          </div>

          <div class="header-meta-divider"></div>

          <div class="header-meta-item">
            <span class="header-meta-label">Role</span>
            <span id="sessionRole" class="header-meta-value"></span>
          </div>

          <div class="header-meta-divider"></div>

          <div class="header-meta-item">
            <span class="header-meta-label">Bank</span>
            <span id="bankIdText" class="header-meta-value"></span>
          </div>
        </div>

        <button id="portalRefreshBtn" class="btn btn-secondary hidden">Refresh</button>
        <button id="logoutBtn" class="btn btn-danger hidden">Logout</button>
      </div>
    </div>

    <div id="announcementBar" class="announcement-inline"></div>
  </div>

  <!-- MAIN -->
  <div class="main-layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-card">
        <h3>Navigation</h3>
        <div id="navTabs" class="nav-tabs"></div>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="content-area">

      <!-- DASHBOARD -->
      <div id="dashboardSection" class="page-panel">
        <div class="card">
          <h2>Dashboard</h2>
          <p id="welcomeTitle"></p>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <span class="stat-label">Orders</span>
            <span id="statOrders" class="stat-value">0</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Sales</span>
            <span id="statSales" class="stat-value">$0</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Employees</span>
            <span id="statEmployees" class="stat-value">0</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Raffle</span>
            <span id="statRaffle" class="stat-value">0</span>
          </div>
        </div>

        <div id="announcementsList"></div>
      </div>

      <!-- POS -->
      <div id="posSection" class="page-panel hidden">
        <div class="pos-layout">

          <div class="card">
            <h3>Products</h3>
            <div id="productGrid" class="product-grid"></div>
          </div>

          <div class="card">
            <h3>Cart</h3>

            <div id="cartList"></div>

            <div class="totals-box">
              <div><span>Subtotal</span><span id="subtotalText">$0.00</span></div>
              <div><span>Total</span><span id="totalText">$0.00</span></div>
            </div>

            <div class="form-grid">
              <input id="customerName" placeholder="Customer Name">
              <input id="customerDiscord" placeholder="Discord">
              <input id="phoneNumber" placeholder="Phone">
            </div>

            <button id="submitOrderBtn" class="btn btn-primary">Submit Order</button>
          </div>

        </div>
      </div>

      <!-- SETTINGS -->
      <div id="settingsSection" class="page-panel hidden">
        <div class="card">
          <h2>Settings</h2>

          <div class="settings-accordion">

            <details class="settings-popout">
              <summary>🍩 Products</summary>
              <div class="settings-popout-body">
                <div id="productsAdminList" class="settings-entry-list"></div>

                <div class="button-row">
                  <button id="addProductRowBtn" class="btn btn-secondary">Add Product</button>
                  <button id="saveProductsBtn" class="btn btn-primary">Save</button>
                </div>
              </div>
            </details>

            <details class="settings-popout">
              <summary>💳 Payment Methods</summary>
              <div class="settings-popout-body">
                <div id="paymentMethodsAdminList" class="settings-entry-list"></div>

                <div class="button-row">
                  <button id="addPaymentMethodRowBtn" class="btn btn-secondary">Add Method</button>
                  <button id="savePaymentMethodsBtn" class="btn btn-primary">Save</button>
                </div>
              </div>
            </details>

          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- PRODUCT MODAL -->
<div id="productModalBackdrop" class="modal-backdrop hidden"></div>
<div id="productModal" class="settings-modal hidden">
  <div class="settings-modal-card">

    <div class="settings-modal-header">
      <h2 id="productModalTitle">ADD PRODUCT</h2>
      <button id="productModalClose">×</button>
    </div>

    <div class="settings-modal-body">
      <input id="productModalIndex" type="hidden">
      <input id="productModalName" placeholder="Name">
      <input id="productModalPrice" type="number" placeholder="Price">
      <select id="productModalActive">
        <option value="Yes">Active</option>
        <option value="No">Inactive</option>
      </select>
    </div>

    <div class="settings-modal-footer">
      <button id="productModalDelete" class="btn btn-danger">Delete</button>
      <button id="productModalCancel" class="btn btn-secondary">Cancel</button>
      <button id="productModalSave" class="btn btn-primary">Save</button>
    </div>

  </div>
</div>

<!-- PAYMENT MODAL -->
<div id="paymentModalBackdrop" class="modal-backdrop hidden"></div>
<div id="paymentModal" class="settings-modal hidden">
  <div class="settings-modal-card">

    <div class="settings-modal-header">
      <h2 id="paymentModalTitle">PAYMENT METHOD</h2>
      <button id="paymentModalClose">×</button>
    </div>

    <div class="settings-modal-body">
      <input id="paymentModalIndex" type="hidden">
      <input id="paymentModalName" placeholder="Method Name">
      <select id="paymentModalActive">
        <option value="Yes">Active</option>
        <option value="No">Inactive</option>
      </select>
    </div>

    <div class="settings-modal-footer">
      <button id="paymentModalDelete" class="btn btn-danger">Delete</button>
      <button id="paymentModalCancel" class="btn btn-secondary">Cancel</button>
      <button id="paymentModalSave" class="btn btn-primary">Save</button>
    </div>

  </div>
</div>

<!-- LOADING -->
<div id="loadingOverlay" class="loading-overlay hidden">
  <div class="loading-card">
    <div class="loading-spinner"></div>
    <div id="loadingTitle">Loading</div>
    <div id="loadingText">Please wait</div>
  </div>
</div>

<script src="app.js"></script>

</body>
</html>
